<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DuraNoia — Model Pairing Page · 4 Versions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --violet-deep:#7c3aed; --violet-soft:#b39ddb; --violet-dark:#4c1d95;
    --paper:#f6f3fb; --paper-2:#ece6f7; --ink:#1a1325; --ink-2:#5a4e75; --muted:#9087a8; --line:#d9cff0; --ok:#1f8a5b;
    --mono:"JetBrains Mono", monospace; --sans:"Space Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#e8e3ef;color:var(--ink);font-family:var(--sans)}
  .page{max-width:1320px;margin:0 auto;padding:22px 24px 80px}
  .top .kick{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-deep);font-weight:600;margin-bottom:6px}
  .top h1{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:0}
  .top .lede{color:var(--ink-2);max-width:78ch;line-height:1.45;margin-top:6px;font-size:14px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 16px;align-items:center}
  .tab{appearance:none;border:1.5px solid var(--violet-dark);background:#fff;padding:8px 14px 9px;border-radius:999px;cursor:pointer;font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.04em;color:var(--ink);transition:all .15s ease}
  .tab:hover{background:var(--paper-2)}
  .tab.is-active{background:var(--violet-deep);border-color:var(--violet-deep);color:#fff}
  .tab .n{opacity:.6;margin-right:8px;font-weight:400}
  .frame{background:var(--paper);border:1.5px solid var(--violet-dark);border-radius:14px;overflow:hidden;box-shadow:6px 6px 0 var(--violet-dark)}

  /* shared bits */
  .glyph{border:1.5px solid var(--violet-deep);border-radius:9px;display:grid;place-items:center;background:var(--paper-2);font-family:var(--mono);font-weight:800;color:var(--violet-dark);overflow:hidden}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-deep);font-weight:700}
  .label{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .crumb{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px}
  .crumb b{color:var(--ink)}
  .btn{border:0;border-radius:11px;cursor:pointer;background:linear-gradient(180deg,#8b4bf0,var(--violet-deep));color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;padding:12px 20px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 20px rgba(124,58,237,.28);transition:all .15s ease;text-decoration:none}
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(124,58,237,.4)}
  .btn.ghost{background:#fff;color:var(--violet-deep);border:1.5px solid var(--line);box-shadow:none}
  .pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;font-weight:700;font-size:13px}
  .sec{padding:34px max(30px,4vw)}

  .partner{display:flex;align-items:center;gap:12px}
  .partner .nm{font-weight:800;font-size:15px}
  .partner .ds{font-size:12.5px;color:var(--ink-2);margin-top:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="pairing-ideas.jsx"></script>
</body>
</html>
