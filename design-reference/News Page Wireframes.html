<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DuraNoia — Newswire</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --violet-deep:#7c3aed; --violet-soft:#b39ddb; --violet-dark:#4c1d95;
    --paper:#f6f3fb; --paper-2:#ece6f7; --ink:#1a1325; --ink-2:#5a4e75; --muted:#9087a8; --line:#d9cff0;
    --hand:"Caveat", cursive; --mono:"JetBrains Mono", monospace; --sans:"Space Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#f6f3fb;font-family:var(--sans);color:var(--ink)}
  .page{max-width:none;margin:0;padding:0}
  .wf{background:#fff}

  /* Nav (matches homepage) */
  .navstrip{display:flex;align-items:center;justify-content:space-between;padding:18px max(60px, 6vw);border-bottom:1.5px solid var(--line);background:var(--paper);font-family:var(--mono);font-size:13.5px;letter-spacing:.04em}
  .navstrip .links{display:flex;gap:38px;color:var(--ink);font-weight:600;font-family:var(--sans)}
  .nav-link{position:relative;cursor:pointer;padding:4px 0;display:inline-block;transition:color .15s ease}
  .nav-link::after{content:"";position:absolute;left:0;bottom:0;height:2px;width:100%;background:var(--violet-deep);transform:scaleX(0);transform-origin:left center;transition:transform .28s cubic-bezier(.65,.05,.36,1)}
  .nav-link:hover{color:var(--violet-deep)}
  .nav-link:hover::after{transform:scaleX(1)}
  .nav-pill{cursor:pointer;transition:transform .08s ease, box-shadow .15s ease, background-color .15s ease, color .15s ease;user-select:none}
  .nav-pill.ghost:hover{background:var(--violet-dark) !important;color:#fff !important;border-color:var(--violet-dark) !important;transform:translateY(-1px)}
  .nav-pill.solid:hover{background:var(--violet-dark) !important;border-color:var(--violet-dark) !important;transform:translateY(-1px);box-shadow:0 6px 18px rgba(76,29,149,.35)}
  .nav-pill:active{transform:translateY(0)}
  .pill{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:#fff;color:var(--ink-2)}

  .sec{padding:34px max(40px, 4vw)}
  .label{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .glyph{border:1.5px solid var(--violet-deep);border-radius:7px;display:grid;place-items:center;background:var(--paper-2);font-family:var(--mono);font-weight:800;color:var(--violet-dark)}

  /* Hero */
  .news-hero{padding:40px max(40px, 4vw) 22px;background:var(--paper);border-bottom:1px solid var(--line)}
  .news-hero .super{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--violet-deep);font-weight:600;display:flex;align-items:center;gap:10px}
  .news-hero .super .live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--violet-deep);box-shadow:0 0 0 0 rgba(124,58,237,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(124,58,237,.45)}70%{box-shadow:0 0 0 8px rgba(124,58,237,0)}100%{box-shadow:0 0 0 0 rgba(124,58,237,0)}}
  .news-hero h1{margin:10px 0 8px;font-size:44px;font-weight:800;letter-spacing:-.025em;line-height:.98;color:var(--violet-dark)}
  .news-hero h1 em{font-style:italic;color:var(--violet-deep)}
  .news-hero .sub{font-size:15px;color:var(--ink);max-width:62ch;line-height:1.5}

  /* Featured */
  .featured{display:grid;grid-template-columns:1.1fr .9fr;gap:0;border:1.5px solid var(--violet-deep);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s ease, transform .2s ease}
  .featured:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(124,58,237,.18)}
  .featured .img{position:relative;min-height:300px;background:
    radial-gradient(circle at 30% 30%, rgba(124,58,237,.30) 0, transparent 60%),
    repeating-linear-gradient(135deg, #ece6f7 0 16px, #ddd0ee 16px 32px)}
  .featured .img .tag{position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;background:#fff;border:1px solid var(--violet-deep);border-radius:4px;padding:4px 9px;color:var(--violet-dark);font-weight:700}
  .featured .img .imgnote{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--violet-dark);opacity:.5;letter-spacing:.08em}
  .featured .body{padding:28px;display:flex;flex-direction:column;justify-content:center;background:#fff}
  .featured .body .meta{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .featured .body h2{margin:0 0 12px;font-size:30px;letter-spacing:-.02em;line-height:1.05}
  .featured .body p{margin:0 0 18px;font-size:14.5px;color:var(--ink-2);line-height:1.55}
  .featured .body .more{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--violet-deep);letter-spacing:.04em;display:inline-flex;gap:6px;align-items:center}
  .featured:hover .more .ar{transform:translateX(3px)}
  .more .ar{display:inline-block;transition:transform .2s ease}

  /* Filters */
  .filters{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11.5px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-2);transition:all .2s ease;font-weight:500}
  .chip:hover{border-color:var(--violet-deep);color:var(--violet-deep);transform:translateY(-1px)}
  .chip.is-on{background:var(--violet-deep);border-color:var(--violet-deep);color:#fff;font-weight:700;transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,58,237,.26)}

  /* Card */
  .ncard{display:flex;flex-direction:column;border:1.5px solid var(--line);border-radius:12px;background:#fff;overflow:hidden;cursor:pointer;transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease}
  .ncard:hover{transform:translateY(-4px);border-color:var(--violet-deep);box-shadow:0 14px 30px rgba(124,58,237,.16)}
  .ncard .nimg{height:120px;position:relative;background:
    radial-gradient(circle at 70% 30%, rgba(179,157,219,.45) 0, transparent 60%),
    repeating-linear-gradient(135deg, #f1ecfa 0 14px, #e6dcf4 14px 28px)}
  .ncard .nimg .co{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:999px;padding:3px 9px 3px 3px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink)}
  .ncard .nimg .co .g{width:20px;height:20px;font-size:10px}
  .ncard .nbody{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .ncard .nmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.05em}
  .ncard .nmeta b{color:var(--violet-deep)}
  .ncard h3{margin:0;font-size:15.5px;line-height:1.25;letter-spacing:-.01em}
  .ncard .nex{font-size:12.5px;color:var(--ink-2);line-height:1.45;flex:1}
  .ncard .nread{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--violet-deep);letter-spacing:.06em;display:inline-flex;gap:5px;align-items:center}
  .ncard:hover .nread .ar{transform:translateX(3px)}

  /* Newsletter strip */
  .nl{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;background:var(--paper-2);border:1.5px solid var(--line);border-radius:14px;padding:24px 28px;margin-top:8px}
  .nl h3{margin:0;font-size:22px;letter-spacing:-.01em}
  .nl p{margin:4px 0 0;font-size:13.5px;color:var(--ink-2)}
  .nl .form{display:flex;gap:8px}
  .nl input{border:1.5px solid var(--line);border-radius:8px;padding:11px 14px;font-family:var(--mono);font-size:13px;background:#fff;min-width:240px}
  .nl button{border:0;border-radius:8px;background:var(--violet-deep);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;padding:11px 18px;cursor:pointer;transition:all .2s ease}
  .nl button:hover{background:var(--violet-dark);transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,58,237,.3)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="news-data.jsx"></script>
<script type="text/babel" src="news-page.jsx"></script>
<script type="text/babel" src="news-app.jsx"></script>
</body>
</html>
