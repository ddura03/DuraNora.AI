<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DuraNoia — About</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --violet-deep:#7c3aed; --violet-soft:#b39ddb; --violet-dark:#4c1d95;
    --paper:#f6f3fb; --paper-2:#ece6f7; --ink:#1a1325; --ink-2:#5a4e75; --muted:#9087a8; --line:#d9cff0;
    --hand:"Caveat", cursive; --mono:"JetBrains Mono", monospace; --sans:"Space Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#f6f3fb;font-family:var(--sans);color:var(--ink)}
  .page{max-width:none;margin:0;padding:0}
  .wf{background:#fff}

  /* Nav */
  .navstrip{display:flex;align-items:center;justify-content:space-between;padding:18px max(60px, 6vw);border-bottom:1.5px solid var(--line);background:var(--paper);font-family:var(--mono);font-size:13.5px;letter-spacing:.04em}
  .navstrip .links{display:flex;gap:38px;color:var(--ink);font-weight:600;font-family:var(--sans)}
  .nav-link{position:relative;cursor:pointer;padding:4px 0;display:inline-block;transition:color .15s ease}
  .nav-link::after{content:"";position:absolute;left:0;bottom:0;height:2px;width:100%;background:var(--violet-deep);transform:scaleX(0);transform-origin:left center;transition:transform .28s cubic-bezier(.65,.05,.36,1)}
  .nav-link:hover{color:var(--violet-deep)}
  .nav-link:hover::after{transform:scaleX(1)}
  .nav-pill{cursor:pointer;transition:transform .08s ease, box-shadow .15s ease, background-color .15s ease, color .15s ease;user-select:none}
  .nav-pill.ghost:hover{background:var(--violet-dark) !important;color:#fff !important;border-color:var(--violet-dark) !important;transform:translateY(-1px)}
  .nav-pill.solid:hover{background:var(--violet-dark) !important;border-color:var(--violet-dark) !important;transform:translateY(-1px);box-shadow:0 6px 18px rgba(76,29,149,.35)}
  .nav-pill:active{transform:translateY(0)}
  .pill{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:#fff;color:var(--ink-2)}

  .sec{padding:56px max(40px, 4vw)}
  .label{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet-deep);font-weight:600}

  /* Hero */
  .about-hero{position:relative;overflow:hidden;padding:72px max(40px, 4vw) 60px;background:
    radial-gradient(circle at 20% 30%, rgba(124,58,237,.10) 0, transparent 60%),
    radial-gradient(circle at 85% 90%, rgba(179,157,219,.22) 0, transparent 55%),
    linear-gradient(180deg, var(--paper) 0%, #fff 100%);
    border-bottom:1px solid var(--line)}
  .about-hero .inner{position:relative;max-width:1000px}
  .about-hero h1{margin:14px 0 16px;font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:.98;color:var(--violet-dark)}
  .about-hero h1 em{font-style:italic;color:var(--violet-deep)}
  .about-hero .sub{font-size:18px;color:var(--ink);max-width:60ch;line-height:1.55}

  /* Mission split */
  .mission{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
  .mission h2{font-size:30px;letter-spacing:-.02em;margin:8px 0 14px;line-height:1.1}
  .mission p{font-size:15.5px;color:var(--ink-2);line-height:1.6;margin:0 0 14px}
  .mission .quote{border-left:4px solid var(--violet-deep);padding:8px 0 8px 20px;font-size:22px;font-style:italic;line-height:1.35;color:var(--ink);max-width:34ch}

  /* Name origin card — matches the About hero treatment */
  .origin{background:
    radial-gradient(circle at 20% 30%, rgba(124,58,237,.10) 0, transparent 60%),
    radial-gradient(circle at 85% 90%, rgba(179,157,219,.22) 0, transparent 55%),
    linear-gradient(180deg, var(--paper) 0%, #fff 100%);
    color:var(--ink);border:1.5px solid var(--line);border-radius:16px;padding:48px;position:relative;overflow:hidden}
  .origin .big{font-family:var(--sans);font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:.98}
  .origin .big .a{color:var(--violet-dark)}.origin .big .b{color:var(--violet-deep)}
  .origin .row{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap}
  .origin .chip{border:1px solid var(--violet-soft);border-radius:10px;padding:14px 16px;background:rgba(255,255,255,.6);min-width:150px}
  .origin .chip .t{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet-deep);font-weight:700}
  .origin .chip .d{font-size:13.5px;margin-top:4px;line-height:1.4;color:var(--ink-2)}

  /* Values */
  .values{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .value{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:22px;transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease}
  .value:hover{transform:translateY(-3px);border-color:var(--violet-deep);box-shadow:0 14px 30px rgba(124,58,237,.14)}
  .value .vn{font-family:var(--mono);font-size:12px;color:var(--violet-deep);font-weight:700;letter-spacing:.06em}
  .value h3{margin:10px 0 8px;font-size:18px;letter-spacing:-.01em}
  .value p{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.5}

  /* Founder */
  .founder{display:grid;grid-template-columns:280px 1fr;gap:40px;align-items:center}
  .founder .photo{position:relative;width:280px;height:280px;border-radius:18px;overflow:hidden;border:2px solid var(--violet-deep);box-shadow:0 20px 50px rgba(76,29,149,.22)}
  .founder .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .founder .photo .ring{position:absolute;inset:-2px;border-radius:18px;pointer-events:none;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
  .founder .tag{position:absolute;left:14px;bottom:14px;background:rgba(12,13,16,.82);color:#fff;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;padding:5px 10px;border-radius:6px}
  .founder h2{font-size:30px;letter-spacing:-.02em;margin:0 0 6px}
  .founder .role{font-family:var(--mono);font-size:12px;color:var(--violet-deep);letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .founder p{font-size:15px;color:var(--ink-2);line-height:1.6;margin:0 0 14px;max-width:60ch}
  .founder .socials{display:flex;gap:8px;margin-top:6px}
  .founder .socials a{font-family:var(--mono);font-size:11.5px;border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;color:var(--ink);text-decoration:none;cursor:pointer;transition:all .2s ease}
  .founder .socials a:hover{border-color:var(--violet-deep);color:var(--violet-deep);transform:translateY(-1px)}

  /* CTA */
  .cta{background:var(--paper-2);border:1.5px solid var(--line);border-radius:16px;padding:40px;text-align:center}
  .cta h2{margin:0 0 8px;font-size:28px;letter-spacing:-.02em}
  .cta p{margin:0 auto 20px;font-size:15px;color:var(--ink-2);max-width:50ch;line-height:1.5}
  .cta .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .cta .btn{font-family:var(--mono);font-size:12.5px;font-weight:700;letter-spacing:.04em;border-radius:8px;padding:12px 20px;cursor:pointer;border:1.5px solid var(--violet-deep);transition:all .2s ease}
  .cta .btn.solid{background:var(--violet-deep);color:#fff}
  .cta .btn.solid:hover{background:var(--violet-dark);transform:translateY(-1px);box-shadow:0 8px 20px rgba(124,58,237,.3)}
  .cta .btn.ghost{background:#fff;color:var(--violet-dark)}
  .cta .btn.ghost:hover{background:var(--paper);transform:translateY(-1px)}

  @media (max-width:880px){
    .mission,.founder{grid-template-columns:1fr}
    .values{grid-template-columns:1fr}
    .founder .photo{width:220px;height:220px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="about-page.jsx"></script>
<script type="text/babel" src="about-app.jsx"></script>
</body>
</html>
