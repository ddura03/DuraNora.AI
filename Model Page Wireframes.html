<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DuraNoia — Model Page · 4 Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --violet-deep:#7c3aed;
    --violet-soft:#b39ddb;
    --violet-dark:#4c1d95;
    --paper:#f6f3fb;
    --paper-2:#ece6f7;
    --ink:#1a1325;
    --ink-2:#5a4e75;
    --muted:#9087a8;
    --line:#d9cff0;
    --hand:"Caveat", cursive;
    --mono:"JetBrains Mono", monospace;
    --sans:"Space Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#f6f3fb;font-family:var(--sans);color:var(--ink)}

  .page{max-width:none;margin:0;padding:0}
  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:14px}
  .top h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--ink)}
  .top .lede{color:var(--ink-2);max-width:64ch;line-height:1.45;margin-top:6px;font-size:14.5px}
  .pill{font-family:var(--mono);font-size:11px;border:1px solid var(--line);border-radius:999px;padding:4px 10px;background:#fff;color:var(--ink-2)}

  /* Tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .tab{
    appearance:none;border:1.5px solid var(--violet-dark);background:#fff;
    padding:8px 14px 9px;border-radius:999px;cursor:pointer;
    font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.04em;
    color:var(--ink);
    transition:transform .08s ease, background-color .15s ease, color .15s ease;
  }
  .tab:hover{background:var(--paper-2)}
  .tab.is-active{background:var(--violet-deep);border-color:var(--violet-deep);color:#fff}
  .tab .n{opacity:.6;margin-right:8px;font-weight:400}
  .tab.is-active .n{opacity:.85}

  /* Wireframe frame */
  .wf{
    background:#fff;
    border:0;
    border-radius:0;
    overflow:visible;
    box-shadow:none;
  }
  .wf-meta{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:9px 16px;border-bottom:1.5px dashed var(--violet-dark);
    font-family:var(--mono);font-size:11px;color:var(--ink-2);background:var(--paper-2);
  }
  .wf-meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--violet-deep);margin-right:6px;vertical-align:middle}
  .wf-meta .pills{display:flex;gap:6px}

  /* Box / wireframe primitives */
  .box{border:1.5px dashed var(--line);border-radius:6px;background:var(--paper)}
  .box.solid{border-style:solid}
  .box.filled{background:var(--paper-2)}
  .box.deep{background:var(--violet-deep);color:#fff;border:0}

  .label{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .annot{font-family:var(--hand);font-size:16px;color:var(--violet-deep);line-height:1.1}

  /* Generic placeholder fills */
  .ph-line{height:6px;background:#ece6f7;border-radius:3px}
  .ph-line.short{width:60%}
  .ph-line.mid{width:80%}
  .ph-line.dark{background:#c4b3e6}

  /* Video stand-in */
  .vid{
    position:relative;border:1.5px solid var(--violet-dark);border-radius:6px;
    background:
      linear-gradient(135deg, rgba(124,58,237,.08) 0%, rgba(76,29,149,.12) 100%),
      repeating-linear-gradient(135deg, #ece6f7 0 14px, #ddd0f0 14px 28px);
    overflow:hidden;
  }
  .vid .play{
    position:absolute;inset:0;display:grid;place-items:center;
  }
  .vid .play::before{
    content:""; width:0;height:0;
    border-style:solid; border-width:14px 0 14px 22px;
    border-color:transparent transparent transparent var(--violet-deep);
    filter:drop-shadow(0 2px 6px rgba(76,29,149,.3));
  }
  .vid .tag{
    position:absolute;top:8px;left:10px;
    font-family:var(--mono);font-size:10px;letter-spacing:.08em;
    background:#fff;border:1px solid var(--violet-deep);border-radius:3px;
    padding:2px 6px;color:var(--violet-dark)
  }
  .vid .dur{
    position:absolute;bottom:8px;right:10px;
    font-family:var(--mono);font-size:10px;letter-spacing:.08em;
    background:rgba(20,19,37,.85);color:#fff;border-radius:3px;
    padding:2px 6px
  }

  /* Sec/section */
  .sec{padding:30px max(40px, 4vw)}
  .sec h2{margin:0 0 10px;font-size:26px;font-weight:800;letter-spacing:-.02em}
  .sec .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet-deep);margin-bottom:6px}

  .nav-strip{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px max(40px, 4vw);
    border-bottom:1.5px solid var(--line);background:#fff;
    font-family:var(--mono);font-size:12px;color:var(--ink-2);
  }
  .nav-strip .ident{display:flex;align-items:center;gap:10px;color:var(--ink);font-weight:600}
  .nav-strip .m{width:22px;height:22px;border:1.25px solid var(--violet-deep);border-radius:5px;display:grid;place-items:center;font-weight:700;color:var(--violet-deep)}
  .nav-strip .crumbs{color:var(--muted)}
  .nav-strip .crumbs b{color:var(--ink);font-weight:600}

  /* Identity card (used in multiple variants) */
  .id-block{display:flex;align-items:center;gap:20px}
  .id-glyph{
    width:72px;height:72px;border:1.5px solid var(--violet-deep);border-radius:14px;
    display:grid;place-items:center;background:var(--paper-2);
    font-family:var(--mono);font-weight:800;font-size:32px;color:var(--violet-dark)
  }
  .id-name{font-family:var(--sans);font-weight:800;font-size:42px;letter-spacing:-.02em;line-height:.95}
  .id-name .by{display:block;font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.14em;color:var(--violet-deep);margin-top:6px}

  /* Stats row */
  .stats{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px}
  .stat{border:1.5px solid var(--line);border-radius:8px;padding:14px;background:#fff}
  .stat .k{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .stat .v{font-family:var(--sans);font-size:18px;font-weight:700;margin-top:4px}

  /* Lesson row primitive */
  .lesson-row{
    display:grid;grid-template-columns:60px 1fr 200px 110px;gap:18px;align-items:center;
    padding:14px;border:1.5px dashed var(--line);border-radius:8px;background:#fff;
  }
  .lesson-row .n{
    font-family:var(--mono);font-size:22px;font-weight:700;color:var(--violet-deep);
    text-align:center;border:1.5px solid var(--violet-deep);border-radius:8px;padding:6px 0;background:var(--paper-2)
  }
  .lesson-row .body h4{margin:0 0 4px;font-size:16px}
  .lesson-row .body p{margin:0;font-size:13px;color:var(--ink-2)}
  .lesson-row .body .row{display:flex;gap:6px;margin-top:6px}
  .lesson-row .body .row .pill{font-size:10px;padding:2px 7px}
  .lesson-row .vid{height:80px}
  .lesson-row .cta{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;font-weight:700;
    background:var(--violet-deep);color:#fff;border:0;border-radius:6px;padding:10px 12px;cursor:pointer;
    text-align:center
  }

  /* Card / tile primitive */
  .tile{
    border:1.5px solid var(--line);border-radius:10px;background:#fff;
    padding:14px;display:flex;flex-direction:column;gap:10px;
    cursor:pointer;transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .tile:hover{transform:translateY(-3px);border-color:var(--violet-deep);box-shadow:0 10px 28px rgba(124,58,237,.16)}
  .tile .vid{height:130px}
  .tile h5{margin:0;font-size:14.5px;line-height:1.25}
  .tile .meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.05em}
  .tile .meta b{color:var(--violet-deep)}

  /* Pullquote (editorial) */
  .pull{
    border-left:4px solid var(--violet-deep);
    padding:8px 18px;
    font-family:var(--sans);font-style:italic;font-size:22px;line-height:1.3;
    color:var(--ink);max-width:38ch
  }
  .pull cite{display:block;font-style:normal;font-size:12px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;margin-top:6px}

  /* Workspace pane chrome */
  .pane{border:1.5px solid var(--line);border-radius:8px;background:#fff;overflow:hidden;display:flex;flex-direction:column}
  .pane .pane-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1.5px solid var(--line);background:var(--paper-2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-2);text-transform:uppercase}
  .pane .pane-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px}

  /* Code-ish placeholder */
  .code{
    background:#fafafa;border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--ink-2);
    line-height:1.5;white-space:pre-wrap
  }
  .code .k{color:var(--violet-deep);font-weight:700}

  /* Notes (annotations) */
  .note-stack{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .note{font-family:var(--hand);font-size:17px;color:var(--violet-deep);line-height:1.1}

  /* Filter chips row */
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-2)}
  /* Hover animation — section tabs (Lessons / Prompts / Compare / News) */
  .tab-pill{
    cursor:pointer;
    transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .12s ease, box-shadow .18s ease;
  }
  .tab-pill:not(.is-on):hover{
    background:var(--paper-2) !important;
    color:var(--violet-deep) !important;
    border-color:var(--violet-deep) !important;
    transform:translateY(-1px);
  }
  .tab-pill.is-on:hover{
    background:var(--violet-dark) !important;
    border-color:var(--violet-dark) !important;
    box-shadow:0 6px 16px rgba(124,58,237,.32);
    transform:translateY(-1px);
  }

  /* Hover animation — "Pair with" cards */
  .pair-card{
    cursor:pointer;
    transition: background-color .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .pair-card:hover{
    background:var(--paper-2) !important;
    border-color:var(--violet-deep) !important;
    transform:translateX(3px);
    box-shadow:0 6px 18px rgba(124,58,237,.18);
  }
  .pair-card .pair-arrow{ transition: transform .2s ease; display:inline-block }
  .pair-card:hover .pair-arrow{ transform: translateX(4px); color:var(--violet-dark) !important }

  /* Save progress pill */
  .save-pill{
    cursor:pointer;
    transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .12s ease, box-shadow .18s ease;
  }
  .save-pill:hover{
    background:var(--violet-deep) !important;
    border-color:var(--violet-deep) !important;
    color:#fff !important;
    transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(124,58,237,.28);
  }

  /* Mark complete & next — hover animation */
  .complete-btn{
    cursor:pointer;
    transition: background-color .2s ease, transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, letter-spacing .2s ease;
  }
  .complete-btn:hover{
    background:var(--violet-dark) !important;
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(124,58,237,.36);
    letter-spacing:.07em;
  }
  .complete-btn:active{ transform:translateY(0); box-shadow:0 4px 12px rgba(124,58,237,.3); }
  .complete-btn .chk{ display:inline-block; transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
  .complete-btn:hover .chk{ transform:scale(1.25) rotate(8deg); }
  .complete-btn .nx{ display:inline-block; transition:transform .25s ease; }
  .complete-btn:hover .nx{ transform:translateX(4px); }

  /* Prev / Next lesson nav — color shift only */
  .lesson-nav{
    display:inline-flex; align-items:center; gap:6px;
    cursor:pointer;
    transition: color .18s ease;
    user-select:none;
  }
  .lesson-nav:not(.is-disabled):hover{ color:var(--violet-dark) }
  .lesson-nav.is-disabled{ cursor:default; opacity:.35 }
</style>
</head>
<body>
<div id="root"></div>

<script src="duranoia-store.js"></script>
<script type="text/babel" src="models-catalog.jsx"></script>
<script type="text/babel" src="model-page-v3.jsx"></script>
<script type="text/babel" src="model-page-app.jsx"></script>
</body>
</html>
