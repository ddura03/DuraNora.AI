<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DuraNoia.AI — Sign in</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --violet-deep:#7c3aed; --violet-soft:#b39ddb; --violet-dark:#4c1d95;
    --paper:#f6f3fb; --paper-2:#ece6f7; --ink:#1a1325; --ink-2:#5a4e75; --muted:#9087a8; --line:#d9cff0;
    --mono:"JetBrains Mono", monospace; --sans:"Space Grotesk", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#ece6f7;color:var(--ink);font-family:var(--sans)}
  #root{height:100%}

  /* Stage that fills the viewport and hosts the animated background */
  .auth-stage{
    position:relative; min-height:100vh; width:100%;
    display:grid; place-items:center; overflow:hidden;
    background:
      radial-gradient(circle at 22% 28%, rgba(124,58,237,.20) 0, transparent 55%),
      radial-gradient(circle at 82% 78%, rgba(179,157,219,.45) 0, transparent 55%),
      repeating-linear-gradient(135deg, #ece6f7 0 18px, #e3daf2 18px 36px);
  }
  .auth-scan{position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(76,29,149,.03) 0 2px, transparent 2px 4px)}

  /* Top-left brand */
  .auth-brand{position:absolute;top:26px;left:max(26px,4vw);display:flex;align-items:center;gap:11px;z-index:3;cursor:pointer;text-decoration:none}
  .auth-brand .wm{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .auth-brand .wm .d{color:var(--ink)} .auth-brand .wm .n{color:var(--violet-deep)}
  .auth-brand .tag{font-family:var(--mono);font-size:10.5px;color:var(--violet-dark);letter-spacing:.18em;font-weight:600;margin-left:6px}

  /* Glass card */
  .card{
    position:relative; z-index:2; width:min(440px, 92vw);
    padding:42px 40px 34px;
    background:rgba(255,255,255,.55);
    border:1.5px solid rgba(255,255,255,.7);
    border-radius:22px;
    backdrop-filter:blur(18px) saturate(1.3);
    -webkit-backdrop-filter:blur(18px) saturate(1.3);
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 30px 70px rgba(76,29,149,.22),
      0 0 0 1px rgba(124,58,237,.10);
  }

  .card h1{margin:0;text-align:center;font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--violet-dark)}
  .card .sub{margin:6px 0 26px;text-align:center;font-size:13.5px;color:var(--ink-2)}

  .field{position:relative;margin-bottom:14px}
  .field input{
    width:100%; border:1.5px solid rgba(124,58,237,.28); background:rgba(255,255,255,.7);
    border-radius:12px; padding:15px 46px 15px 16px; font-family:var(--sans); font-size:14.5px; color:var(--ink);
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease; outline:none;
  }
  .field input::placeholder{color:#8d82a8}
  .field input:focus{border-color:var(--violet-deep);background:rgba(255,255,255,.92);box-shadow:0 0 0 4px rgba(124,58,237,.14)}
  .field .ic{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--violet-deep);opacity:.75;pointer-events:none;display:grid;place-items:center}

  .row{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 20px;font-size:13px}
  .remember{display:flex;align-items:center;gap:8px;color:var(--ink-2);cursor:pointer;user-select:none}
  .remember input{position:absolute;opacity:0;width:0;height:0}
  .remember .box{width:17px;height:17px;border:1.5px solid var(--violet-deep);border-radius:5px;background:rgba(255,255,255,.7);display:grid;place-items:center;transition:all .15s ease}
  .remember input:checked + .box{background:var(--violet-deep)}
  .remember input:checked + .box::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-.5px,-1px)}
  .remember:hover .box{box-shadow:0 0 0 4px rgba(124,58,237,.12)}
  .link{color:var(--violet-deep);font-weight:600;cursor:pointer;text-decoration:none;transition:color .15s ease}
  .link:hover{color:var(--violet-dark)}

  .btn{
    width:100%;border:0;border-radius:12px;cursor:pointer;
    background:linear-gradient(180deg, #8b4bf0 0%, var(--violet-deep) 100%);
    color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.01em;
    padding:15px 18px;display:flex;align-items:center;justify-content:center;gap:9px;
    box-shadow:0 10px 24px rgba(124,58,237,.34);
    transition:transform .12s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .btn .ar{display:inline-block;transition:transform .18s ease}
  .btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(124,58,237,.45)}
  .btn:hover .ar{transform:translateX(4px)}
  .btn:active{transform:translateY(0)}

  .alt{margin-top:22px;text-align:center;font-size:13.5px;color:var(--ink-2)}

  /* Divider + SSO */
  .div{display:flex;align-items:center;gap:12px;margin:22px 0 18px;color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:.14em}
  .div::before,.div::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.3),transparent)}
  .sso{display:flex;gap:10px}
  .sso button{flex:1;border:1.5px solid rgba(124,58,237,.25);background:rgba(255,255,255,.65);border-radius:11px;padding:11px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s ease}
  .sso button:hover{border-color:var(--violet-deep);background:#fff;transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,58,237,.16)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="signin-page.jsx"></script>
</body>
</html>
